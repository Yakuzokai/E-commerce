name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  # ==================== LINT & TYPE CHECK ====================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - order-service
        include:
          - service: auth-service
            path: microservices/auth-service
          - service: product-service
            path: microservices/product-service
          - service: order-service
            path: microservices/order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.path }}/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.path }}

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ matrix.path }}

      - name: Run TypeScript check
        run: npm run type-check
        working-directory: ${{ matrix.path }}

  # ==================== UNIT TESTS ====================
  test:
    name: Unit Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - order-service
        include:
          - service: auth-service
            path: microservices/auth-service
          - service: product-service
            path: microservices/product-service
          - service: order-service
            path: microservices/order-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ matrix.path }}/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.path }}

      - name: Run tests
        run: npm test
        working-directory: ${{ matrix.path }}

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: ${{ matrix.service }}

  # ==================== FRONTEND BUILD ====================
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/ecommerce-frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/ecommerce-frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend/ecommerce-frontend

      - name: Build application
        run: npm run build
        working-directory: frontend/ecommerce-frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/ecommerce-frontend/dist
          retention-days: 7

  # ==================== DOCKER BUILD (all services) ====================
  docker-build:
    name: Docker Build - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - order-service
        include:
          - service: auth-service
            path: microservices/auth-service
            dockerfile: microservices/auth-service/Dockerfile
          - service: product-service
            path: microservices/product-service
            dockerfile: microservices/product-service/Dockerfile
          - service: order-service
            path: microservices/order-service
            dockerfile: microservices/order-service/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== SECURITY SCAN ====================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run npm audit
        run: |
          for dir in microservices/*/ frontend/ecommerce-frontend/; do
            if [ -f "$dir/package.json" ]; then
              echo "Auditing $dir"
              cd "$dir"
              npm audit --audit-level=high
              cd - > /dev/null
            fi
          done
