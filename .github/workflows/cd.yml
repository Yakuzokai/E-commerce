name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  # ==================== DEPLOY STAGING ====================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    concurrency:
      group: deploy-staging
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Deploy backend services
        run: |
          echo "${{ secrets.STAGING_SSH_KEY }}" > staging_key.pem
          chmod 600 staging_key.pem

          # Copy docker-compose files
          scp -i staging_key.pem -o StrictHostKeyChecking=no \
            infrastructure/docker/docker-compose.yml \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/opt/ecommerce/

          # Pull latest images and restart services
          ssh -i staging_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            cd /opt/ecommerce
            docker-compose pull
            docker-compose up -d
            docker-compose logs --tail=50
          ENDSSH

      - name: Deploy Frontend
        run: |
          echo "${{ secrets.STAGING_SSH_KEY }}" > staging_key.pem
          chmod 600 staging_key.pem

          # Build frontend
          cd frontend/ecommerce-frontend
          npm ci
          npm run build

          # Deploy to web server
          rsync -avz -e "ssh -i staging_key.pem -o StrictHostKeyChecking=no" \
            --delete \
            dist/ \
            ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/var/www/ecommerce-staging/

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 *Staging Deployment Complete*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*E-commerce Platform*\nDeployed to *Staging*\nCommit: `${{ github.sha }}`\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ==================== DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.environment == 'production'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Run database migrations
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > prod_key.pem
          chmod 600 prod_key.pem

          ssh -i prod_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'
            cd /opt/ecommerce
            docker-compose exec -T order-service npm run migrate
          ENDSSH

      - name: Deploy backend services (rolling update)
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > prod_key.pem
          chmod 600 prod_key.pem

          # Rolling update with health checks
          ssh -i prod_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'
            cd /opt/ecommerce
            # Pull latest images
            docker-compose pull
            # Rolling restart with health checks
            for service in auth-service product-service order-service; do
              docker-compose up -d --no-deps $service
              echo "Waiting for $service to be healthy..."
              sleep 10
              docker-compose exec -T $service npm run health-check || exit 1
            done
          ENDSSH

      - name: Deploy Frontend (blue-green)
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > prod_key.pem
          chmod 600 prod_key.pem

          # Build frontend
          cd frontend/ecommerce-frontend
          npm ci
          npm run build

          # Deploy to blue environment
          rsync -avz -e "ssh -i prod_key.pem -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:/var/www/ecommerce-blue/

      - name: Switch traffic (nginx reload)
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > prod_key.pem
          chmod 600 prod_key.pem

          ssh -i prod_key.pem -o StrictHostKeyChecking=no \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'ENDSSH'
            # Reload nginx to switch traffic
            sudo nginx -s reload
            echo "Traffic switched to new deployment"
          ENDSSH

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') == false
        run: |
          TAG="v$(date +'%Y%m%d-%H%M%S')"
          git tag $TAG
          git push origin $TAG

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 *Production Deployment Complete*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*E-commerce Platform*\n🎯 Deployed to *Production*\nCommit: `${{ github.sha }}`\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ==================== HEALTH CHECK ====================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Check services health
        run: |
          echo "Checking staging environment..."
          curl -f https://staging-api.ecommerce.example.com/health || exit 1
          curl -f https://staging.ecommerce.example.com/health || exit 1
          echo "All health checks passed!"

# ==================== MONITORING ====================
monitor:
  name: Setup Monitoring Dashboards
  runs-on: ubuntu-latest
  if: github.ref == 'refs/heads/main'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Prometheus
      run: |
        # Update Prometheus configuration with new targets
        echo "Updating Prometheus configuration..."
        # This would typically update Prometheus config via API or file

    - name: Create Grafana dashboards
      uses: grafana/grafana-github-action@v1.0.0
      with:
        dashboards: monitoring/grafana/dashboards/
        config: monitoring/grafana/provisioning/
