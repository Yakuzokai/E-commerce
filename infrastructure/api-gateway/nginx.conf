# API Gateway Nginx Configuration
# ShopHub E-commerce Platform

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=50r/s;

# Upstream backend services
upstream auth_service {
    least_conn;
    server auth-service:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream product_service {
    least_conn;
    server product-service:3002 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream order_service {
    least_conn;
    server order-service:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream payment_service {
    least_conn;
    server payment-service:3004 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream search_service {
    least_conn;
    server search-service:3005 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream cart_service {
    least_conn;
    server cart-service:3006 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream notification_service {
    least_conn;
    server notification-service:3007 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Client body size
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffers
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # ==================== AUTH SERVICE ====================
    location /api/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;

        proxy_pass http://auth_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Circuit breaker headers
        proxy_intercept_errors off;
    }

    # ==================== PRODUCT SERVICE ====================
    location /api/products/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://product_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Cache for product listings (5 minutes)
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /api/categories/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://product_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Longer cache for categories
        proxy_cache_valid 200 30m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
    }

    # ==================== ORDER SERVICE ====================
    location /api/orders/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://order_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-User-Id $http_x_user_id;  # From JWT middleware
    }

    location /api/users/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://order_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-User-Id $http_x_user_id;
    }

    # ==================== PAYMENT SERVICE ====================
    location /api/payments/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://payment_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/refunds/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://payment_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ==================== SEARCH SERVICE ====================
    location /api/search/ {
        limit_req zone=search_limit burst=100 nodelay;

        proxy_pass http://search_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Short cache for search results
        proxy_cache_valid 200 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri$args";
    }

    # ==================== CART SERVICE ====================
    location /api/cart/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://cart_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-User-Id $http_x_user_id;
    }

    # ==================== NOTIFICATION SERVICE ====================
    location /api/notifications/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_set_header X-User-Id $http_x_user_id;
    }

    # ==================== HEALTH CHECK ====================
    location /health {
        access_log off;
        return 200 "OK";
    }

    location /health/full {
        access_log off;

        # Check all upstream services
        proxy_pass http://auth_service/health;
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout;
        error_page 502 503 504 = @fallback;
    }

    location @fallback {
        return 503 "Service Unavailable";
    }

    # ==================== METRICS ====================
    location /metrics {
        # In production, this would expose Prometheus metrics
        return 200 "# Prometheus metrics endpoint\n# Requires additional setup for detailed metrics\n";
        add_header Content-Type text/plain;
    }

    # ==================== LOGGING ====================
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;
}
