    container_name: shophub-recommendation
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3010
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKERS=kafka:9092
